sonar.projectKey=LBHackney-IT_lbh-fss-public-api
sonar.organization=lbhackney-it
sonar.sources=LBHFSSPublicAPI
sonar.tests=LBHFSSPublicAPI.Tests
sonar.test.inclusions=LBHFSSPublicAPI.Tests/**

# Exclude test project from main analysis; exclude front-end assets if present
sonar.exclusions=LBHFSSPublicAPI.Tests/**,**/*.js,**/*.ts,**/*.css
sonar.dotnet.excludeTestProjects=true

# OpenCover from build-and-test Report step (paths rewritten from /app/ to workspace)
sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"
