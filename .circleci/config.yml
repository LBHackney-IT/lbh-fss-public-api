version: 2.1

orbs:
  aws_assume_role: lbh-hackit/aws_assume_role@0.1.0
  aws-cli: circleci/aws-cli@5.1.1
  sonarcloud: sonarsource/sonarcloud@2.0.0

executors:
  docker-python:
    docker:
      - image: cimg/python:3.11
  docker-terraform:
    docker:
      - image: hashicorp/terraform:1.14.5
  docker-dotnet:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:8.0

references:
  workspace_root: &workspace_root "~"
  attach_workspace: &attach_workspace
    attach_workspace:
      at: *workspace_root

commands:
  assume-role-and-persist-workspace:
    description: "Assumes deployment role and persists credentials across jobs"
    parameters:
      aws-account:
        type: string
    steps:
      - checkout
      - aws_assume_role/assume_role:
          account: <<parameters.aws-account>>
          profile_name: default
          role: "LBH_Circle_CI_Deployment_Role"
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - .aws
  deploy-lambda:
    description: "Deploys API via Serverless"
    parameters:
      stage:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - run:
          name: Install Node
          command: |
            apt-get update
            apt-get install -y curl ca-certificates
            curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
            apt-get install -y nodejs
      - run:
          name: Build and deploy lambda
          working_directory: ./LBHFSSPublicAPI/
          command: |
            set -e
            chmod +x ./build.sh
            ./build.sh
            npx --yes serverless@4 deploy --stage <<parameters.stage>> --conceal
  migrate-database:
    description: "Migrate database"
    parameters:
      stage:
        type: string
      aws-central-parameter-account:
        type: string
    steps:
      - *attach_workspace
      - aws-cli/install
      - checkout
      - run: echo "MY_ENV_VAR is $AWS_ACCOUNT_CENTRAL_PARAMETER_STORE"
      - run: echo "MY_OTHJER_ENV_VAR is <<parameters.aws-central-parameter-account>>"
      - run: echo "MY_ENV_VAR is $AWS_ACCOUNT_CENTRAL_PARAMETER_STORE"
      - run: echo "MY_OTHJER_ENV_VAR is <<parameters.aws-central-parameter-account>>"
      - run:
          name: Install dependencies
          command: |
            apt-get update
            apt-get install -y openssh-client curl
            curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
            dpkg -i session-manager-plugin.deb
      - run:
          name: Install dotnet ef core
          command: dotnet tool install dotnet-ef --tool-path ./dotnet-ef-local/
      - run:
          name: SSH into RDS and migrate database
          command: |
            aws ssm get-parameter --name "/platform-apis-jump-box-pem-key" --output text --query Parameter.Value > ./private-key.pem
            chmod 400 ./private-key.pem
            HOST=$(aws ssm get-parameter --name arn:aws:ssm:eu-west-2:<<parameters.aws-central-parameter-account>>:parameter/<<parameters.stage>>apis/fss-public-api-<<parameters.stage>>/fss-public-api/postgres-hostname --query Parameter.Value --output text)
            PORT=$(aws ssm get-parameter --name arn:aws:ssm:eu-west-2:<<parameters.aws-central-parameter-account>>:parameter/<<parameters.stage>>apis/fss-public-api-<<parameters.stage>>/fss-public-api/postgres-port --query Parameter.Value --output text)
            INSTANCE_NAME=$(aws ssm get-parameter --name arn:aws:ssm:eu-west-2:<<parameters.aws-central-parameter-account>>:parameter/<<parameters.stage>>apis/<<parameters.stage>>-apis/<<parameters.stage>>apis/jump-box-instance-name --query Parameter.Value --output text)
            ssh -4 -i ./private-key.pem -Nf -M -L 6000:${HOST}:${PORT} -o "UserKnownHostsFile=/dev/null" -o "StrictHostKeyChecking=no" -o ProxyCommand="aws ssm start-session --target %h --document AWS-StartSSHSession --parameters portNumber=%p --region=eu-west-2" ec2-user@${INSTANCE_NAME}
            PASSWORD=$(aws ssm get-parameter --name /fss-public-api/<<parameters.stage>>/postgres-password --query Parameter.Value --output text)
            USERNAME=$(aws ssm get-parameter --name /fss-public-api/<<parameters.stage>>/postgres-username --query Parameter.Value --output text)
            DATABASE=$(aws ssm get-parameter --name arn:aws:ssm:eu-west-2:<<parameters.aws-central-parameter-account>>:parameter/<<parameters.stage>>apis/fss-public-api-<<parameters.stage>>/fss-public-api/postgres-database --query Parameter.Value --output text)
            ADDRESSES_URL=$(aws ssm get-parameter --name arn:aws:ssm:eu-west-2:<<parameters.aws-central-parameter-account>>:parameter/<<parameters.stage>>apis/fss-public-api-<<parameters.stage>>/fss-public-api/addresses-api-base-url --query Parameter.Value --output text)
            ADDRESSES_KEY=$(aws ssm get-parameter --name /fss-public-api/<<parameters.stage>>/addresses-api-key --query Parameter.Value --output text)
            ADDRESSES_API_TOKEN=$(aws ssm get-parameter --name /fss-common-api/<<parameters.stage>>/addresses-api-token --query Parameter.Value --output text)
            CONN_STR="Host=localhost;Password=${PASSWORD};Port=6000;Username=${USERNAME};Database=${DATABASE}"
            cd ./LBHFSSPublicAPI/
            ADDRESSES_API_BASE_URL=${ADDRESSES_URL} ADDRESSES_API_KEY=${ADDRESSES_KEY} ADDRESSES_API_TOKEN=${ADDRESSES_API_TOKEN} CONNECTION_STRING=${CONN_STR} ./../dotnet-ef-local/dotnet-ef database update

  preview-terraform:
    description: "Previews terraform configuration changes"
    parameters:
      environment:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - run:
          name: preview terraform
          command: |
            terraform init \
              -backend-config="bucket=terraform-state-<<parameters.environment>>-apis" \
              -backend-config="key=services/fss-public-api/terraform.tfstate"
            terraform validate
            terraform plan -var="environment=<<parameters.environment>>"

  deploy-terraform:
    description: "Initializes and applies terraform configuration"
    parameters:
      environment:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - run:
          name: Initialize and apply terraform
          command: |
            terraform init \
              -backend-config="bucket=terraform-state-<<parameters.environment>>-apis" \
              -backend-config="key=services/fss-public-api/terraform.tfstate"
            terraform validate
            terraform apply -auto-approve -var="environment=<<parameters.environment>>"
      - run:
          name: show terraform outputs
          command: terraform output -json
          when: on_success
      - store_artifacts:
          path: /tmp/terraform-outputs-<<parameters.environment>>.json
          destination: terraform-outputs

jobs:
  check-code-formatting:
    executor: docker-dotnet
    steps:
      - checkout
      - run:
          name: Install dotnet format
          command: dotnet tool install dotnet-format --tool-path ./dotnet-format-local/
      - run:
          name: Run formatter check
          command: ./dotnet-format-local/dotnet-format --check
  sonar-scan:
    executor: docker-python
    steps:
      - checkout:
          method: full
      - sonarcloud/scan
  build-and-test:
    executor: docker-python
    steps:
      - checkout
      - setup_remote_docker
      - run:
            name: Start database
            command: |
              docker compose up -d test-database
              echo "Waiting for database to be ready..."
              timeout 60 sh -c 'until docker compose exec -T test-database pg_isready -U postgres; do sleep 2; done'
      - run:
          name: Build test image
          command: docker compose build fss-public-api-test
      - run:
          name: Run tests
          command: docker compose run -e ADDRESSES_API_BASE_URL -e ADDRESSES_API_KEY -e ADDRESSES_API_TOKEN --rm fss-public-api-test
      - run:
          name: Cleanup
          when: always
          command: docker compose down -v
  assume-role-development:
    executor: docker-python
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_DEVELOPMENT
  assume-role-staging:
    executor: docker-python
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_STAGING
  assume-role-production:
    executor: docker-python
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_PRODUCTION
  deploy-to-development:
    executor: docker-dotnet
    steps:
      - deploy-lambda:
          stage: "development"
  deploy-to-staging:
    executor: docker-dotnet
    steps:
      - deploy-lambda:
          stage: "staging"
  deploy-to-production:
    executor: docker-dotnet
    steps:
      - deploy-lambda:
          stage: "production"
  migrate-database-development:
    executor: docker-dotnet
    steps:
      - migrate-database:
          stage: "development"
          aws-central-parameter-account: $AWS_ACCOUNT_CENTRAL_PARAMETER_STORE
  migrate-database-staging:
    executor: docker-dotnet
    steps:
      - migrate-database:
          stage: "staging"
          aws-central-parameter-account: $AWS_ACCOUNT_CENTRAL_PARAMETER_STORE
  migrate-database-production:
    executor: docker-dotnet
    steps:
      - migrate-database:
          stage: "production"
          aws-central-parameter-account: $AWS_ACCOUNT_CENTRAL_PARAMETER_STORE
  deploy-development-terraform:
    executor: docker-terraform
    steps:
      - deploy-terraform:
          environment: "development"
  deploy-staging-terraform:
    executor: docker-terraform
    steps:
      - deploy-terraform:
          environment: "staging"
  deploy-production-terraform:
    executor: docker-terraform
    steps:
      - deploy-terraform:
          environment: "production"
  preview-development-terraform:
    executor: docker-terraform
    steps:
      - preview-terraform:
          environment: "development"
  preview-staging-terraform:
    executor: docker-terraform
    steps:
      - preview-terraform:
          environment: "staging"
  preview-production-terraform:
    executor: docker-terraform
    steps:
      - preview-terraform:
          environment: "production"

workflows:
  feature:
    jobs:
      - check-code-formatting:
          filters:
            branches:
              ignore:
                - develop
                - master
      - sonar-scan:
          context: SonarCloud
          filters:
            branches:
              ignore:
                - develop
                - master
      - build-and-test:
          context: find-support-services-public-api-context
          requires: [check-code-formatting, sonar-scan]
          filters:
            branches:
              ignore:
                - develop
                - master
      - assume-role-development:
          context: api-assume-role-development-context
          filters:
            branches:
              ignore:
                - develop
                - master
      - preview-development-terraform:
          requires:
            - assume-role-development
          filters:
            branches:
              ignore:
                - develop
                - master
      - assume-role-staging:
          context: api-assume-role-staging-context
          filters:
            branches:
              ignore:
                - develop
                - master
      - preview-staging-terraform:
          requires:
            - assume-role-staging
          filters:
            branches:
              ignore:
                - develop
                - master
      - assume-role-production:
          context: api-assume-role-production-context
          filters:
            branches:
              ignore:
                - develop
                - master
      - preview-production-terraform:
          requires:
            - assume-role-production
          filters:
            branches:
              ignore:
                - develop
                - master
  test-database-migration:
    jobs:
      - assume-role-development:
          context: api-assume-role-development-context
          filters:
            branches:
              only: [bugfix/database-migration]
      - migrate-database-development:
          context: api-assume-role-development-context
          requires:
            - assume-role-development
          filters:
            branches:
              only: [bugfix/database-migration]
  check-and-deploy-development:
    jobs:
      - check-code-formatting:
          filters:
            branches:
              only: [develop]
      - sonar-scan:
          context: SonarCloud
          filters:
            branches:
              only: [develop]
      - build-and-test:
          context: find-support-services-public-api-context
          requires: [check-code-formatting, sonar-scan]
          filters:
            branches:
              only: [develop]
      - permit-development-release:
          type: approval
          requires:
            - build-and-test
          filters:
            branches:
              only: [develop]
      - assume-role-development:
          context: api-assume-role-development-context
          requires:
            - permit-development-release
          filters:
            branches:
              only: [development]
      - migrate-database-development:
          context: api-assume-role-development-context
          requires:
            - assume-role-development
          filters:
            branches:
              only: [development]
      - deploy-to-development:
          context:
            - "Serverless Framework"
          requires: [assume-role-development, migrate-database-development]
          filters:
            branches:
              only: [develop]
  check-and-deploy-staging-and-production:
    jobs:
      - build-and-test:
          context: find-support-services-public-api-context
          filters:
            branches:
              only: master
      - permit-staging-release:
          type: approval
          requires:
            - build-and-test
          filters:
            branches:
              only: master
      - assume-role-staging:
          context: api-assume-role-staging-context
          requires:
            - permit-staging-release
          filters:
            branches:
              only: master
      - migrate-database-staging:
          requires:
            - assume-role-staging
          filters:
            branches:
              only: master
      - deploy-to-staging:
          context:
            - "Serverless Framework"
          requires: [assume-role-staging, migrate-database-staging]
          filters:
            branches:
              only: master
      - permit-production-release:
          type: approval
          requires:
            - deploy-to-staging
          filters:
            branches:
              only: master
      - assume-role-production:
          context: api-assume-role-production-context
          requires:
            - permit-production-release
          filters:
            branches:
              only: master
      - migrate-database-production:
          requires:
            - assume-role-production
          filters:
            branches:
              only: master
      - deploy-to-production:
          context:
            - "Serverless Framework"
          requires: [assume-role-production, migrate-database-production]
          filters:
            branches:
              only: master
  terraform-release:
    jobs:
      - permit-terraform-development-release:
          type: approval
          filters:
            branches:
              only: develop
      - assume-role-development:
          context: api-assume-role-development-context
          requires:
            - permit-terraform-development-release
          filters:
            branches:
              only: develop
      - deploy-development-terraform:
          requires:
            - assume-role-development
          filters:
            branches:
              only: develop

      - permit-terraform-staging-release:
          type: approval
          filters:
            branches:
              only: master
      - assume-role-staging:
          context: api-assume-role-staging-context
          requires:
            - permit-terraform-staging-release
          filters:
            branches:
              only: master
      - deploy-staging-terraform:
          requires:
            - assume-role-staging
          filters:
            branches:
              only: master
      - permit-terraform-production-release:
          type: approval
          filters:
            branches:
              only: master
      - assume-role-production:
          context: api-assume-role-production-context
          requires:
            - permit-terraform-production-release
          filters:
            branches:
              only: master
      - deploy-production-terraform:
          requires:
            - assume-role-production
          filters:
            branches:
              only: master
